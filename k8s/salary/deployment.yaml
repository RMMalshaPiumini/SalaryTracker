apiVersion: apps/v1
kind: Deployment
metadata:
  name: salary-submission-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salary-submission-service
  template:
    metadata:
      labels:
        app: salary-submission-service
    spec:
      containers:
        - name: salary-submission-service
          image: aelita1999/salary-submission-service:v1
          ports:
            - containerPort: 8082
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /salaries/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /salaries/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: salary-submission-service
  namespace: app
spec:
  selector:
    app: salary-submission-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
