apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote-service
  template:
    metadata:
      labels:
        app: vote-service
    spec:
      containers:
        - name: vote-service
          image: aelita1999/vote-service:v1
          ports:
            - containerPort: 8083
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PASSWORD
            - name: IDENTITY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: IDENTITY_SERVICE_URL
            - name: SALARY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SALARY_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /votes/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /votes/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: vote-service
  namespace: app
spec:
  selector:
    app: vote-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
