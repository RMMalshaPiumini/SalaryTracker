apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
        - name: frontend-service
          image: aelita1999/frontend-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          readinessProbe:
            httpGet:
              path: /
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: app
spec:
  selector:
    app: frontend-service
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP
