server:
  port: 8084

spring:
  application:
    name: search-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/techsalary
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none        # search service only READS, never creates tables
    properties:
      hibernate:
        default_schema: salary
    show-sql: true