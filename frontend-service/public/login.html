<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechSalary LK – Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="/index.html" class="logo">💰 TechSalary LK</a>
    <ul>
        <li><a href="/index.html">Search</a></li>
        <li><a href="/submit.html">Submit Salary</a></li>
        <li><a href="/pending.html">Vote</a></li>
        <li><a href="/stats.html">Stats</a></li>
    </ul>
    <a href="/login.html" class="auth-btn" id="auth-link">Login / Signup</a>
</nav>

<div class="container">
    <div class="form-card">
        <h2 id="form-title">🔐 Login</h2>
        <div id="alert-box"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" id="submit-btn" onclick="submitForm()">Login</button>

        <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:#888;">
            <span id="toggle-text">Don't have an account?</span>
            <a href="#" onclick="toggleMode()" id="toggle-link">Sign up</a>
        </p>
    </div>
</div>

<script src="app.js"></script>
<script>
    let isSignup = false;

    function toggleMode() {
        isSignup = !isSignup;
        document.getElementById('form-title').textContent =
            isSignup ? '📝 Sign Up' : '🔐 Login';
        document.getElementById('submit-btn').textContent =
            isSignup ? 'Create Account' : 'Login';
        document.getElementById('toggle-text').textContent =
            isSignup ? 'Already have an account?' : "Don't have an account?";
        document.getElementById('toggle-link').textContent =
            isSignup ? 'Login' : 'Sign up';
    }

    async function submitForm() {
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showAlert('alert-box', 'Please enter email and password', 'error');
            return;
        }

        const endpoint = isSignup ? '/auth/signup' : '/auth/login';

        try {
            const res = await apiCall('POST', endpoint, { email, password });
            const data = await res.json();

            if (res.ok) {
                // Save token and userId
                localStorage.setItem('token', data.token);
                localStorage.setItem('userId', data.userId);
                showAlert('alert-box',
                    `✅ ${isSignup ? 'Account created!' : 'Welcome back!'} Redirecting...`,
                    'success');
                setTimeout(() => window.location.href = '/index.html', 1000);
            } else {
                showAlert('alert-box', `❌ ${data.message || 'Authentication failed'}`, 'error');
            }
        } catch (err) {
            showAlert('alert-box', '❌ Service unavailable.', 'error');
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitForm();
    });
</script>
</body>
</html>
